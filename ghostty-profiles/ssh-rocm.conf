# Ghostty profile: ssh-rocm
# Workload: kade — SSH into ROCm-AIBOX (<rocm-aibox-lan-ip>), bare-metal Ubuntu/ROCm
# Red accent: you always know you're remote
# Inherits base config, overrides colors only
config-file = ~/.config/ghostty/config

background = "#1a0000"
foreground = "#ffb3b3"
cursor-color = "#f7768e"
selection-background = "#3a0000"
selection-foreground = "#ffb3b3"

# Red/danger palette
palette = 0=#1a0000
palette = 1=#f7768e
palette = 2=#9ece6a
palette = 3=#e0af68
palette = 4=#7aa2f7
palette = 5=#bb9af7
palette = 6=#7dcfff
palette = 7=#ffb3b3
palette = 8=#3a0000
palette = 9=#ff0000
palette = 10=#9ece6a
palette = 11=#e0af68
palette = 12=#7aa2f7
palette = 13=#bb9af7
palette = 14=#7dcfff
palette = 15=#ffb3b3

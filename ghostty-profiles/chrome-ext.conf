# Ghostty profile: chrome-ext
# Workload: ellow — Chrome MV3, Puppeteer, Jest, web extension dev
# Inherits base config, overrides colors only
config-file = ~/.config/ghostty/config

background = "#001a1a"
foreground = "#c0f0f0"
cursor-color = "#7dcfff"
selection-background = "#003333"
selection-foreground = "#c0f0f0"

# Teal/cyan web-dev palette
palette = 0=#001a1a
palette = 1=#f7768e
palette = 2=#9ece6a
palette = 3=#e0af68
palette = 4=#7aa2f7
palette = 5=#bb9af7
palette = 6=#7dcfff
palette = 7=#c0f0f0
palette = 8=#003333
palette = 9=#f7768e
palette = 10=#9ece6a
palette = 11=#e0af68
palette = 12=#7aa2f7
palette = 13=#bb9af7
palette = 14=#7dcfff
palette = 15=#c0f0f0
